spring.application.name=backend-java

spring.datasource.url=jdbc:postgresql://localhost:5432/spotify_db
spring.datasource.username=postgresql
spring.datasource.password=secret

spring.jpa.hibernate.ddl-auto=update

spring.docker.compose.enabled=false

spring.profiles.active=dev

# Diretório em disco onde ficam os bytes das capas/fotos, servidos em /images/**.
# Padrão: <cwd>/storage/images (raiz do projeto quando rodado via ./mvnw).
app.images.dir=${user.dir}/storage/images